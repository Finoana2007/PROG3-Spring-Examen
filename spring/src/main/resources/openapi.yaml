openapi: 3.0.3
info:
  title: Gestion des ingrédients API
  description: API pour la gestion des ingrédients (TD Spring Boot)
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: Serveur de développement

paths:
  /ingredients/{id}:
    get:
      summary: Récupérer un ingrédient par son identifiant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: Identifiant unique de l'ingrédient
      responses:
        '200':
          description: Succès - retourne l'ingrédient
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    format: int64
                  name:
                    type: string
                  category:
                    type: string
                  price:
                    type: number
                    format: double
              example:
                id: 1
                name: "Tomate"
                category: "Légume"
                price: 2.5
        '404':
          description: Ingrédient non trouvé
          content:
            text/plain:
              schema:
                type: string
              example: "Ingredient.id=1 is not found"

  /ingredients/{id}/stock:
    get:
      summary: Récupérer la valeur de stock d'un ingrédient à une date donnée
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: Identifiant de l'ingrédient
        - name: at
          in: query
          required: true
          schema:
            type: string
            format: date-time
          description: Date/heure à laquelle on veut connaître le stock
        - name: unit
          in: query
          required: true
          schema:
            type: string
            enum: [PCS, KG, L]
          description: Unité de mesure (PCS, KG ou L)
      responses:
        '200':
          description: Succès - retourne la valeur du stock
          content:
            application/json:
              schema:
                type: object
                properties:
                  unit:
                    type: string
                  value:
                    type: number
              example:
                unit: "KG"
                value: 100
        '400':
          description: Paramètre obligatoire manquant
          content:
            text/plain:
              schema:
                type: string
              example: "Either mandatory query parameter `at` or `unit` is not provided."
        '404':
          description: Ingrédient non trouvé
          content:
            text/plain:
              schema:
                type: string
              example: "Ingredient.id=1 is not found"